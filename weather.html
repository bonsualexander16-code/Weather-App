<!DOCTYPE html>
<html>

<head>
    <title>Weather App</title>
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <style>
        * {
            color: white;
        }

        body {
            margin: 0;
            text-align: center;
            background: black;
            width: 100%;
            overflow-x: hidden;
        }

        header {
            background: transparent;
            padding: 3px 8px;
            border-bottom: solid grey 0.004pc;
        }

        header h1 {
            left: 0;
            font-family: Courier;
        }

        .input {
            margin-top: 10px;
            width: 90%;
            max-width: 450px;
        }

        .input input {
            padding: 10px 15px;
            color: white;
            border-color: red;
            background: transparent;
            border-radius: 20px;
            border-width: 0.095px;
            font-weight: bold;
            margin-right: 10px;
        }

        .input input.active {
            border: none;
        }

        .input input:focus {
            border: none;
        }

        .input button {
            background: transparent;
            border-width: 0.095px;
            font-weight: bold;
            padding: 10px 15px;
            border-color: red;
            font-size: 1rem;
            /*  cursor: pointer;*/
            border-radius: 20px;
            transition: transform 0.5s ease;
        }

        .input input:active {
            border-color: green;
        }

        button:active {
            transform: scale(1.4);
        }


        #card {
            border: solid blue 1px;
            margin-top: 80px;
            width: 80%;
            margin: 30px auto;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0.10px 2px 1px 1.0px #EB321E;
            top: 50%;
            left: 20px;
        }



        #card div h3 {
            display: inline-block;

        }

        .ri {
            margin-left: 60px;
            color: red;
            font-family: Courier New;
        }

        .left {
            margin-right: 50px;
            color: blue;
            font-family: Verdana;
        }

        #box {
            background: blue;
            max-height: 200px;
            overflow-y: hidden;
            transition: all 1s;
        }

        #head {
            transition: all 1s ease;
        }
    </style>
</head>
<body>
    <div id="box">
        <h2 id="head">no connection...</h2>
    </div>
    <header>
        <h1 id="name">Weather App</h1>
    </header>
    <div class="input">
        <input type="text" id="typed" placeholder="enter city name">
        <button id="send">
            search
        </button>
    </div>
    <div id="card">
        <h3 id="city">...</h3>
        <div class="cobt">
            <h3 class="left">Humidity</h3><h3 id="hum" class="ri">0%</h3>
        </div>
        <div class="cobt">
            <h3 class="left">Temperature</h3><h3 id="temp" class="ri">0°c</h3>
        </div>
        <div class="cobt">
            <h3 class="left">Wind Speed</h3><h3 id="speed" class="ri">0 km/h</h3>
        </div>

    </div>
</body>
<script>
    let a = 'units=metric';
    let apiKey = "24cbb97f594f954589e85005527f682a";
   // let url = "https://api.openweathermap.org/data/2.5/weather?q={city name}&appid={API key}";
    let search = document.getElementById("typed");
    let searchButton = document.getElementById("send");
    let cityName = document.getElementById("city");
    let hum = document.getElementById("hum");
    let temp = document.getElementById("temp");
    let speed = document.getElementById("speed");
    let box = document.getElementById("box");
    let con = document.getElementById("head");
    
    function load (data) {
        function setCityName() {
            return new Promise ((res, rej)=> {
                setTimeout(()=> {
                    cityName.innerHTML = data.name;
                    res();
                }, 2000)
            })
        }


        function sethum() {
            return new Promise ((res, rej)=> {
                setTimeout(()=> {
                    hum.innerHTML = data.main.humidity + " %";
                    res();
                }, 2000)
            })
        }


        function setTemp() {
            return new Promise ((res, rej)=> {
                setTimeout(()=> {
                    temp.innerHTML = data.main.temp + " °C";
                    res();
                }, 2000)
            })
        }

        function setSpeed() {
            return new Promise ((res, rej)=> {
                setTimeout(()=> {
                    speed.innerHTML = data.wind.speed + " km/h";
                    res();
                }, 2000)
            })
        }
        
        
        
        
                setCityName().then(()=> {
            return sethum();
        })
        .then(()=> {
            return setTemp();
        })
        .then(()=> {
            return setSpeed();
        })

    }
    
    
    

    async function getWeather() {



        let url = `https://api.openweathermap.org/data/2.5/weather?q=${search.value}&appid=${apiKey}&${a}`;
        try{
        
        let res = await fetch(url)
        let data = await res.json();
        console.log(data)
        
        if (data.cod == 404) {
            cityName.innerHTML = data.message;
            hum.innerHTML = "00%"
            temp.innerHTML = "0°C"
            speed.innerHTML = "0 km/h"
            return ; 
        }else{
            load(data) ;
        }
          }   catch(error){
             cityName.innerHTML = error ;
          }

    }



    console.log(navigator.onLine);

    setInterval(()=> {
        if (navigator.onLine === true) {
            setTimeout(()=> {
                box.style.maxHeight = "0px";
                searchButton.setAttribute("disabled", false);

            }, 2000)
        } else {
            setTimeout(()=> {
                box.style.maxHeight = "100px";

                searchButton.setAttribute("disabled", true);

            }, 2000)

        }

    }, 20)


    setInterval(()=> {
        con.innerHTML = "connect to the internet...";

    }, 1000)

    searchButton.addEventListener("touchstart", ()=> {
        getWeather();
    })

searchButton.addEventListener("click", ()=> {
        getWeather();
    })



</script>

</html>
